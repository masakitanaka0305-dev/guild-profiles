<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>田中マサキ — AI PM Guild</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0f1117; color:#e0e0e0;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Hiragino Sans',sans-serif;
      min-height:100vh; display:flex; justify-content:center; padding:24px 16px;
    }
    @media (prefers-color-scheme: light) {
      body { background:#f5f5f7; color:#1d1d1f; }
      .card { background:#fff; border-color:#d2d2d7; }
      .stat-box { background:#f0f0f5; border-color:#d2d2d7; }
      .skill-tag { background:#e8e8ed !important; border-color:#d2d2d7 !important; color:#1d1d1f !important; }
      .sub-text { color:#6e6e73 !important; }
    }
  </style>
</head>
<body>
  <div class="card" style="max-width:520px;width:100%;background:#1a1d27;border-radius:20px;padding:32px;border:1px solid #2a2d3a;">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:48px;margin-bottom:8px;">🥉</div>
      <h1 style="font-size:22px;font-weight:800;margin:0;">田中マサキ</h1>
      <p class="sub-text" style="color:#888;font-size:13px;margin:4px 0;"></p>
      <p style="color:#cd7f32;font-size:14px;font-weight:700;margin:4px 0;">🥉ブロンズ</p>
    </div>

    

    <div style="display:flex;gap:12px;margin:20px 0;">
      <div class="stat-box" style="flex:1;background:#12141c;border-radius:12px;padding:16px;text-align:center;border:1px solid #2a2d3a;">
        <div style="font-size:24px;font-weight:800;color:#88aaff;">0</div>
        <div class="sub-text" style="color:#888;font-size:11px;">ギルド歴(日)</div>
      </div>
      <div class="stat-box" style="flex:1;background:#12141c;border-radius:12px;padding:16px;text-align:center;border:1px solid #2a2d3a;">
        <div style="font-size:24px;font-weight:800;color:#88aaff;">0</div>
        <div class="sub-text" style="color:#888;font-size:11px;">スキル</div>
      </div>
      <div class="stat-box" style="flex:1;background:#12141c;border-radius:12px;padding:16px;text-align:center;border:1px solid #2a2d3a;">
        <div style="font-size:24px;font-weight:800;color:#88aaff;">0</div>
        <div class="sub-text" style="color:#888;font-size:11px;">応募</div>
      </div>
      <div class="stat-box" style="flex:1;background:#12141c;border-radius:12px;padding:16px;text-align:center;border:1px solid #2a2d3a;">
        <div style="font-size:24px;font-weight:800;color:#88aaff;">0</div>
        <div class="sub-text" style="color:#888;font-size:11px;">成約</div>
      </div>
    </div>

    
    
    <div style="margin:20px 0;">
      <p style="color:#888;font-size:13px;margin:0 0 8px;">次のランク: <strong style="color:#e0e0e0;">🥈シルバー</strong></p>
      <div style="background:#1e2030;border-radius:8px;height:14px;overflow:hidden;">
        <div style="background:linear-gradient(90deg,#4466ff,#88aaff);height:100%;width:25%;border-radius:8px;transition:width 0.3s;"></div>
      </div>
    </div>

    <hr style="border:none;border-top:1px solid #2a2d3a;margin:24px 0;">
    <p class="sub-text" style="color:#555;font-size:11px;text-align:center;">
      AI PM Guild DCC — 更新日: 2026-04-20
    </p>
  </div>
</body>
</html>
